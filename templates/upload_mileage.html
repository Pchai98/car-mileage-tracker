<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Upload Mileage</title>\n</head>\n<body>\n    <h1>Upload Car Mileage Photo</h1>\n    <form action="/upload" method="POST" enctype="multipart/form-data">\n        <label for="mileagePhoto">Choose a mileage photo:</label>\n        <input type="file" id="mileagePhoto" name="mileagePhoto" accept="image/*" required>\n        <br>\n        <label for="mileage">Extracted Mileage:</label>\n        <input type="text" id="mileage" name="mileage" required>\n        <br>\n        <label for="photoDate">Photo Date:</label>\n        <input type="date" id="photoDate" name="photoDate" required>\n        <br>\n        <input type="submit" value="Upload Mileage">\n    </form>\n</body>\n</html>
