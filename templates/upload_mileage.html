<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Mileage</title>
    <style>
        .spinner {
            display: none;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Upload Mileage</h1>
    <input type="file" id="upload" accept="image/*">
    <img id="preview" style="display:none;" width="300" />
    <div class="spinner" id="spinner">Loading...</div>
    <div id="mileageValue">Mileage: <span id="value"></span></div>

    <script>
        document.getElementById('upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);

                // Start Loading Spinner
                const spinner = document.getElementById('spinner');
                spinner.style.display = 'block';

                // Call the OCR extraction endpoint
                const formData = new FormData();
                formData.append('file', file);

                fetch('/extract-mileage', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    // Assuming the response contains the mileage in data.mileage
                    document.getElementById('value').innerText = data.mileage;
                })
                .catch(error => console.error('Error:', error))
                .finally(() => {
                    // Hide spinner after processing
                    spinner.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
