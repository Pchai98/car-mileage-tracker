<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Fuel Expense Summary</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
        .summary { font-size: 20px; }
    </style>
</head>
<body>
    <h1>Monthly Fuel Expense Summary</h1>
    <div class="summary">
        <p><strong>Total Liters:</strong> {{ total_liters }} L</p>
        <p><strong>Total Cost:</strong> ${{ total_cost }}</p>
        <p><strong>Average Price per Liter:</strong> ${{ average_price_per_liter }}/L</p>
        <p><strong>Fuel Efficiency Trends:</strong></p>
        <ul>
            {% for trend in fuel_efficiency_trends %}
                <li>{{ trend }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
