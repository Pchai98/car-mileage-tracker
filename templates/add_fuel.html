<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Add Fuel Record</title>\n</head>\n<body>\n    <h1>Add Fuel Record</h1>\n    <form id="fuelForm">\n        <label for="liters">Liters:</label>\n        <input type="number" id="liters" name="liters" step="0.01" required>\n        <br>\n        <label for="fuelGrade">Fuel Grade:</label>\n        <select id="fuelGrade" name="fuelGrade" required>\n            <option value="gasoline">Gasoline</option>\n            <option value="diesel">Diesel</option>\n        </select>\n        <br>\n        <label for="date">Date:</label>\n        <input type="date" id="date" name="date" required>\n        <br>\n        <button type="submit">Submit</button>\n    </form>\n    <div id="costDisplay">Cost: <span id="cost">0</span> THB</div>\n\n    <script>\n        const fuelPrices = {\n            gasoline: 34.00,  // Price per liter in THB\n            diesel: 30.00      // Price per liter in THB\n        };\n\n        document.getElementById('fuelForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const liters = parseFloat(document.getElementById('liters').value);\n            const fuelGrade = document.getElementById('fuelGrade').value;\n            const cost = liters * fuelPrices[fuelGrade];\n            document.getElementById('cost').innerText = cost.toFixed(2);\n        });\n    <\/script>\n</body>\n</html>
